<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bible Reader — ESV</title>
  <link rel="stylesheet" href="/static/css/variables.css">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="/static/css/animations.css">
</head>
<body>

<!-- ═══════════════════ TOP BAR ═══════════════════ -->
<header class="topbar">
  <div class="topbar-left">
    <span class="logo">
      <span class="logo-icon">✦</span>
      Bible Reader
    </span>
  </div>
  <div class="topbar-center">
    <button class="tb-btn" id="btnPrev" title="Previous Chapter">‹</button>
    <span class="nav-label" id="navLabel">Select a book</span>
    <button class="tb-btn" id="btnNext" title="Next Chapter">›</button>
  </div>
  <div class="topbar-right">
    <button class="tb-btn tb-btn-wide" id="btnAddHighlight" title="Highlight selected verses">🖍️ Highlight</button>
    <button class="tb-btn tb-btn-wide" id="btnAddBookmark" title="Bookmark this chapter or selected verses">🔖 Bookmark</button>
    <button class="tb-btn tb-btn-wide" id="btnAddNote" title="Add a note">✏️ Note</button>
  </div>
</header>

<!-- ═══════════════════ LAYOUT ═══════════════════ -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-tabs">
      <button class="tab active" data-tab="books">Books</button>
      <button class="tab" data-tab="bookmarks">Bookmarks</button>
      <button class="tab" data-tab="notes">Notes</button>
      <button class="tab" data-tab="highlights">Highlights</button>
    </div>

    <!-- BOOKS PANEL -->
    <div class="tab-panel active" id="tab-books">
      <input class="search-input" id="bookSearch" placeholder="Search books…" autocomplete="off">
      <div id="bibleTree"></div>
    </div>

    <!-- BOOKMARKS PANEL -->
    <div class="tab-panel" id="tab-bookmarks">
      <div id="bookmarkList" class="item-list"></div>
    </div>

    <!-- NOTES PANEL -->
    <div class="tab-panel" id="tab-notes">
      <div id="noteList" class="item-list"></div>
    </div>

    <!-- HIGHLIGHTS PANEL -->
    <div class="tab-panel" id="tab-highlights">
      <div id="highlightList" class="item-list"></div>
    </div>
  </aside>

  <!-- READER AREA -->
  <main class="reader-area" id="readerArea">
    <div class="reader-content" id="readerContent">
      <div class="reader-welcome">
        <h2>Welcome to Bible Reader</h2>
        <p>Select a book and chapter from the sidebar to begin reading the ESV Bible.</p>
      </div>
    </div>
  </main>
</div>

<!-- ═══════════════════ MODALS ═══════════════════ -->

<!-- Bookmark modal -->
<div class="modal-bg" id="bookmarkModal">
  <div class="modal">
    <h3>Bookmark</h3>
    <div class="modal-context" id="bmContext"></div>
    <label>Label
      <input type="text" id="bmLabel" placeholder="e.g. Genesis 1 – Creation">
    </label>
    <div class="modal-actions">
      <button class="btn-secondary" id="bmCancel">Cancel</button>
      <button class="btn-primary" id="bmSave">Save</button>
    </div>
  </div>
</div>

<!-- Note modal -->
<div class="modal-bg" id="noteModal">
  <div class="modal">
    <h3>Add Note</h3>
    <div class="modal-context" id="noteContext"></div>
    <label>Note
      <textarea id="noteText" rows="4" placeholder="Write your note…"></textarea>
    </label>
    <div class="modal-actions">
      <button class="btn-secondary" id="noteCancel">Cancel</button>
      <button class="btn-primary" id="noteSave">Save</button>
    </div>
  </div>
</div>

<!-- Edit note modal -->
<div class="modal-bg" id="editNoteModal">
  <div class="modal">
    <h3>Edit Note</h3>
    <label>Note
      <textarea id="enText" rows="4"></textarea>
    </label>
    <input type="hidden" id="enId">
    <div class="modal-actions">
      <button class="btn-secondary" id="enCancel">Cancel</button>
      <button class="btn-primary" id="enSave">Save</button>
    </div>
  </div>
</div>

<!-- Highlight color picker modal -->
<div class="modal-bg" id="highlightModal">
  <div class="modal">
    <h3>Highlight Verses</h3>
    <div class="modal-context" id="hlContext"></div>
    <label>Color
      <div class="color-picker" id="hlColorPicker">
        <button class="color-swatch active" data-color="#fff3cd" style="background:#fff3cd" title="Yellow"></button>
        <button class="color-swatch" data-color="#d1ecf1" style="background:#d1ecf1" title="Blue"></button>
        <button class="color-swatch" data-color="#d4edda" style="background:#d4edda" title="Green"></button>
        <button class="color-swatch" data-color="#f8d7da" style="background:#f8d7da" title="Pink"></button>
        <button class="color-swatch" data-color="#e2d9f3" style="background:#e2d9f3" title="Purple"></button>
        <button class="color-swatch" data-color="#ffe0cc" style="background:#ffe0cc" title="Orange"></button>
      </div>
    </label>
    <div class="modal-actions">
      <button class="btn-secondary" id="hlCancel">Cancel</button>
      <button class="btn-primary" id="hlSave">Save</button>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
